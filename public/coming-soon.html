<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWorkflow - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .form {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input {
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 16px;
            min-width: 280px;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            background: #0ea5e9;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0284c7;
        }
        .social {
            margin-top: 48px;
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .social a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .social a:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>CineWorkflow</h1>
        <p>Professional AI video prompts for filmmakers.<br>
        150+ tested prompts for Runway, Pika, and more.<br>
        Launching soon.</p>
        
        <form class="form" id="waitlist">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Join Waitlist</button>
        </form>

        <div class="social">
            <a href="#">Twitter</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <script>
        document.getElementById('waitlist').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thanks! We\'ll email you when we launch.');
            this.reset();
        });
    </script>
</body>
</html>
