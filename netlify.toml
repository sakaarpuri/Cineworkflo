[build]
  command = "npm run build:seo"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/camera-moves.html"
  to = "/camera-moves"
  status = 301
  force = true

[[redirects]]
  from = "/prompts/"
  to = "/prompts"
  status = 301
  force = true

[[redirects]]
  from = "/vault/"
  to = "/vault"
  status = 301
  force = true

[[redirects]]
  from = "/prompts/:category/"
  to = "/prompts/:category"
  status = 301
  force = true

[[redirects]]
  from = "/shot-to-prompt/"
  to = "/shot-to-prompt"
  status = 301
  force = true

[[redirects]]
  from = "/camera-moves/"
  to = "/camera-moves"
  status = 301
  force = true

[[redirects]]
  from = "/modern-moves/"
  to = "/modern-moves"
  status = 301
  force = true

[[redirects]]
  from = "/pricing/"
  to = "/pricing"
  status = 301
  force = true

[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/privacy/"
  to = "/privacy"
  status = 301
  force = true

[[redirects]]
  from = "/terms/"
  to = "/terms"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/prompts"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/prompts/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/vault"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/shot-to-prompt"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/camera-moves"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
