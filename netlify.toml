[build]
  command = "npm run build:seo"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/camera-moves.html"
  to = "/camera-moves"
  status = 301
  force = true

[[redirects]]
  from = "/prompts/"
  to = "/prompts"
  status = 301
  force = true

[[redirects]]
  from = "/shot-to-prompt/"
  to = "/shot-to-prompt"
  status = 301
  force = true

[[redirects]]
  from = "/camera-moves/"
  to = "/camera-moves"
  status = 301
  force = true

[[redirects]]
  from = "/modern-moves/"
  to = "/modern-moves"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
