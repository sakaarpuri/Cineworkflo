[build]
  base = "next-app"
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.11.1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/camera-moves.html"
  to = "/camera-moves"
  status = 301
  force = true

[[redirects]]
  from = "/vault"
  to = "/prompts"
  status = 301
  force = true

[[redirects]]
  from = "/modern-moves"
  to = "/camera-moves"
  status = 301
  force = true
